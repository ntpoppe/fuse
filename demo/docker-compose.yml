services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: fuse_test
    volumes:
      - mysql_data:/var/lib/mysql
      - ./seed/mysql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s

  fuse:
    build:
      context: ..
      dockerfile: demo/Dockerfile
    ports:
      - "5000:5000"
    environment:
      FUSE_DEMO_MODE: "1"
      FUSE_CORS_ORIGINS: "http://localhost:8080,http://127.0.0.1:8080"
    depends_on:
      mysql:
        condition: service_healthy

  web:
    image: httpd:2.4-alpine
    ports:
      - "8080:80"
    volumes:
      - ./ui:/usr/local/apache2/htdocs/:ro

volumes:
  mysql_data:
